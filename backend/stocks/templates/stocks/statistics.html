<!DOCTYPE html>

<html>

<a href="{%url 'portfolio' %}">RETURN TO PORTFOLIO</a>    
<title>{{ ticker }} STATS</title>

<style>

table {
    border-collapse: solid;
    border: 1px solid black;
    background-color: white; 
    margin: 10px;
}

td, th, tr {
    padding: 6px 20px;
    border: 1px solid black; 
}

</style>

<div >
    <center>

    <h1>{{ company }}</h1>
    <table class="statistics">
        <tr>
            <td>QUANTITY</td>
            <td>
                {{ quantity }}
            </td>
        </tr>
        <tr>
            <td>CURRENT PRICE (USD)</td>
            <td>
                ${{ current_price}}
            </td>
        </tr>
    </table>
    <table class="statistics">
        <tr>
            <td>MARKET β (S&P500) </td>
            <td>{{ beta_value }}</td>
        </tr>
        <tr>
            <td>
                <p>STOCK-STOCK CROSS BETA</p>
                <form method="POST">
                    {% csrf_token %}
                    <select name="stock_id" onchange="this.form.submit()">
                        <option disabled selected>Select a stock</option>
                        {% for item in stock_data %}
                            <option value="{{ item.id }}">{{ item.ticker }}</option>
                        {% endfor %}
                    </select>
                </form>

            </td>
            <td>
                {{ stock_to_stock }} ({{ second_comp }})
            </td>
        </tr>
        <tr>
            <td>
                HISTORIC VOLATILITY(3 MONTHS)
            </td>
            <td>
                {{ volatility }}%
            </td>
        </tr>

    </table>

    </center>
</div>

</html>
